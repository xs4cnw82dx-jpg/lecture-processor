<div class="app-shell" id="app-shell">
  <button type="button" class="app-shell-overlay" id="app-shell-overlay" aria-label="Close navigation"></button>
  <aside class="app-shell-sidebar" id="app-shell-sidebar" aria-label="Main navigation">
    <a href="/dashboard" class="app-shell-brand">
      <span class="app-shell-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
      </span>
      <span>Lecture Processor</span>
    </a>
    <nav class="app-shell-nav">
      <a href="/dashboard" class="app-shell-link">Dashboard</a>
      <details class="app-shell-group" open>
        <summary>Extraction</summary>
        <a href="/lecture-notes" class="app-shell-link sub">Lecture Notes</a>
        <a href="/slides-extraction" class="app-shell-link sub">Slides Extraction</a>
        <a href="/interview-transcription" class="app-shell-link sub">Interview Transcription</a>
        <a href="/document-reader" class="app-shell-link sub">Document Reader</a>
        <a href="/image-reader" class="app-shell-link sub">Image Reader</a>
        <a href="/url-reader" class="app-shell-link sub">URL Reader</a>
        <a href="/tools" class="app-shell-link sub">Tools Overview</a>
      </details>
      <a href="/study" class="app-shell-link">Study Library</a>
      <a href="/plan" class="app-shell-link">Planner</a>
      <a href="/calendar" class="app-shell-link">Calendar</a>
      <a href="/buy_credits" class="app-shell-link">Buy Credits</a>
    </nav>
  </aside>
  <div class="app-shell-main">
    <header class="app-shell-topbar">
      <button type="button" class="app-shell-menu-btn" id="app-shell-menu-btn" aria-expanded="false" aria-controls="app-shell-sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
        <span>Menu</span>
      </button>
      <div class="app-shell-title">{{ shell_title or 'Lecture Processor' }}</div>
      <a href="/buy_credits" class="app-shell-credits" id="shell-credits-link">0 credits</a>
      <button type="button" class="app-shell-signin" id="shell-sign-in-btn">Sign in</button>
      <div class="app-shell-account" id="shell-account" style="display:none;">
        <button type="button" class="app-shell-account-btn" id="shell-account-btn" aria-haspopup="menu" aria-expanded="false" aria-controls="shell-account-menu">
          <span class="avatar" id="shell-account-initial">?</span>
          <span id="shell-account-name">Account</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="app-shell-account-menu" id="shell-account-menu" role="menu">
          <div class="app-shell-email" id="user-email">Checking sign-in...</div>
          <a href="/buy_credits" class="app-shell-account-item" role="menuitem">Buy credits</a>
          <button type="button" class="app-shell-account-item" id="shell-purchase-history-btn" role="menuitem">Purchase history</button>
          <button type="button" class="app-shell-account-item" id="shell-export-data-btn" role="menuitem">Export data</button>
          <button type="button" class="app-shell-account-item danger" id="signout-btn" role="menuitem">Sign out</button>
        </div>
      </div>
    </header>
