<div class="pricing-overlay" id="pricing-overlay" aria-hidden="true">
    <div class="pricing-modal" role="dialog" aria-modal="true" aria-labelledby="pricing-modal-title">
        <button type="button" class="pricing-modal-close" id="pricing-modal-close" aria-label="Close pricing dialog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="pricing-modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                <line x1="1" y1="10" x2="23" y2="10"></line>
            </svg>
        </div>
        <h2 id="pricing-modal-title">Buy Credits</h2>
        <p class="pricing-modal-subtitle">Choose a credit pack to continue processing your lectures</p>
        <div class="pricing-grid">{{ render_pricing_catalog(pricing_catalog, variant='modal') }}</div>
        <div class="pricing-footer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Secure payment via Stripe &middot; Cards &amp; iDEAL accepted
        </div>
    </div>
</div>

<div class="history-overlay" id="history-overlay" aria-hidden="true">
    <div class="history-modal" role="dialog" aria-modal="true" aria-labelledby="history-modal-title">
        <button type="button" class="history-modal-close" id="history-modal-close" aria-label="Close purchase history dialog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="history-modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        </div>
        <h2 id="history-modal-title">Purchase History</h2>
        <p class="history-modal-subtitle">Your past credit purchases</p>
        <div class="history-list" id="history-list">
            <div class="history-loading" id="history-loading">
                <div class="spinner"></div>
                <span>Loading purchases...</span>
            </div>
        </div>
    </div>
</div>
