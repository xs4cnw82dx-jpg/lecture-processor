<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Credits · Lecture Processor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app-shell.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/buy-credits.css') }}">
</head>
<body>
  {% set shell_title = 'Buy Credits' %}
  {% include '_app_shell.html' %}
    <main class="app-shell-page buy-credits-page">
      <section class="shell-panel hero">
        <h1>Buy Credits</h1>
        <p>Choose a credit pack and continue processing without interruptions.</p>
      </section>
      <section class="pricing-grid">
        <div class="shell-panel category">
          <h2>Lecture Notes</h2>
          <button type="button" class="bundle-buy-btn" data-bundle-id="lecture_5">
            <span class="credits">5 credits</span>
            <span class="price">&euro;9.99</span>
            <span class="meta">Standard lecture processing</span>
            <span class="cta">Buy now</span>
          </button>
          <button type="button" class="bundle-buy-btn featured" data-bundle-id="lecture_10">
            <span class="badge">Best value</span>
            <span class="credits">10 credits</span>
            <span class="price">&euro;16.99</span>
            <span class="meta">Standard lecture processing</span>
            <span class="cta">Buy now</span>
          </button>
        </div>
        <div class="shell-panel category">
          <h2>Text Extraction / Add-ons</h2>
          <button type="button" class="bundle-buy-btn" data-bundle-id="slides_10">
            <span class="credits">10 credits</span>
            <span class="price">&euro;4.99</span>
            <span class="meta">Text extraction + interview extras</span>
            <span class="cta">Buy now</span>
          </button>
          <button type="button" class="bundle-buy-btn featured" data-bundle-id="slides_25">
            <span class="badge">Best value</span>
            <span class="credits">25 credits</span>
            <span class="price">&euro;9.99</span>
            <span class="meta">Text extraction + interview extras</span>
            <span class="cta">Buy now</span>
          </button>
        </div>
        <div class="shell-panel category">
          <h2>Interview</h2>
          <button type="button" class="bundle-buy-btn" data-bundle-id="interview_3">
            <span class="credits">3 credits</span>
            <span class="price">&euro;7.99</span>
            <span class="meta">Timestamped transcription</span>
            <span class="cta">Buy now</span>
          </button>
          <button type="button" class="bundle-buy-btn featured" data-bundle-id="interview_8">
            <span class="badge">Best value</span>
            <span class="credits">8 credits</span>
            <span class="price">&euro;17.99</span>
            <span class="meta">Timestamped transcription</span>
            <span class="cta">Buy now</span>
          </button>
        </div>
      </section>
      <section class="shell-panel purchase-history-panel" id="purchase-history">
        <div class="purchase-history-head">
          <h2>Purchase History</h2>
          <button type="button" class="refresh-history-btn" id="refresh-purchase-history-btn">Refresh</button>
        </div>
        <div class="purchase-history-list" id="purchase-history-list">
          <div class="history-empty">Sign in to view purchase history.</div>
        </div>
      </section>
      <div class="toast" id="buy-credits-toast"></div>
    </main>
  </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js" crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='js/firebase-bootstrap.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth-utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app-shell.js') }}"></script>
  <script src="{{ url_for('static', filename=buy_credits_js_asset or 'js/buy-credits.js') }}"></script>
</body>
</html>
